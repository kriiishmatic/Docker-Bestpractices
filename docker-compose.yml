services:
  frontend:
    image: frontend:v1
    container_name: frontend
    ports:
      - "80:80"
    depends_on:
      - catalogue
      - cart
      - user
      - payment
      - shipping
  mongodb:
    image: mongo:v1
    container_name: mongodb
    volumes:
      - mongodb:/data/db
  redis:
    image: redis:7
    container_name: redis
    volumes:
      - redis:/data

  mysql:
    image: mysql:v1
    container_name: mysql
    volumes:
      - mysql:/var/lib/mysql
  rabbitmq:
    image: rabbitmq:3
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: roboshop
      RABBITMQ_DEFAULT_PASS: passwordroboshop123
    volumes:
      - rabbitmq:/var/lib/rabbitmq
  catalogue:
    image: catalogue:v1
    container_name: catalogue
    depends_on:
      - mongodb
  cart:
    image: cart:v1
    container_name: cart
    depends_on:
      - mongodb
      - catalogue
      - user
  user:
    image: user:v1
    container_name: user
    depends_on:
      - redis
  payment:
    image: payment:v1
    container_name: payment
    depends_on:
      - rabbitmq
  shipping:
    image: shipping:v1
    container_name: shipping
    depends_on:
      - mysql
volumes:
  mongodb:
  redis:
  mysql:
  rabbitmq:
networks:
  default:
    external: false
    name: roboshop
    driver: bridge